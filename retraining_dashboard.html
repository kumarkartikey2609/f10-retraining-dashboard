<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px;}
#loader{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
#loader.hide{opacity:0;pointer-events:none;}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loader p{color:#94a3b8;font-size:13px;}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header h1{font-size:18px;font-weight:700;}
.header .sub{font-size:11px;color:#94a3b8;margin-top:3px;}
.data-badge{font-size:11px;background:rgba(16,185,129,.2);color:#6ee7b7;padding:4px 10px;border-radius:20px;font-weight:600;}
#csvInput{display:none;}
.upload-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;}
.filter-panel{background:white;padding:14px 24px;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.filter-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;}
.fg select{border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 8px;font-size:11px;color:#1a1a2e;background:#f8fafc;min-width:120px;}
.fg select:focus{outline:none;border-color:#6366f1;}
.cb-wrap{position:relative;}
.cb-trigger{border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:11px;color:#1a1a2e;background:#f8fafc;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;min-width:145px;user-select:none;white-space:nowrap;}
.cb-trigger.open{border-color:#6366f1;}
.arr{font-size:9px;color:#94a3b8;transition:transform .2s;}
.cb-trigger.open .arr{transform:rotate(180deg);}
.cb-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:white;border:1.5px solid #e2e8f0;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.13);z-index:999;min-width:210px;max-height:250px;overflow-y:auto;}
.cb-dd.open{display:block;}
.cb-si{padding:8px 10px;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:white;z-index:1;}
.cb-si input{width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:4px 8px;font-size:11px;}
.cb-si input:focus{outline:none;border-color:#6366f1;}
.cb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:11px;color:#334155;}
.cb-item:hover{background:#f5f3ff;}
.cb-item.all-row{border-bottom:1px solid #f1f5f9;font-weight:700;color:#6366f1;position:sticky;top:42px;background:white;z-index:1;}
.cb-item.all-row.no-search{top:0;}
.cb-item input[type=checkbox]{width:13px;height:13px;accent-color:#6366f1;cursor:pointer;flex-shrink:0;}
.cb-cnt{background:#6366f1;color:white;border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;}
.freset{font-size:11px;color:#6366f1;cursor:pointer;font-weight:600;padding:6px 12px;border:1.5px solid #e0e7ff;border-radius:8px;background:#f5f3ff;white-space:nowrap;}
.freset:hover{background:#ede9fe;}
.content{padding:18px 24px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
.kpi{background:white;border-radius:12px;padding:15px 17px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:4px solid transparent;}
.kpi.bl{border-color:#6366f1;}.kpi.gr{border-color:#10b981;}.kpi.or{border-color:#f59e0b;}.kpi.re{border-color:#ef4444;}.kpi.te{border-color:#06b6d4;}
.kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;}
.kv{font-size:26px;font-weight:800;margin:4px 0 2px;color:#0f172a;line-height:1;}
.ks{font-size:10px;color:#64748b;}
.kb{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;}
.bg{background:#d1fae5;color:#065f46;}.br{background:#fee2e2;color:#991b1b;}
.stitle{font-size:13px;font-weight:700;color:#475569;margin:20px 0 12px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
.card.full{grid-column:1/-1;}
.ct{font-size:12px;font-weight:700;color:#1e293b;margin-bottom:2px;}
.cs{font-size:10px;color:#94a3b8;margin-bottom:10px;}
.cog{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cocard{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
.cohdr{margin-bottom:10px;}
.cobadge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.cu{background:#fef3c7;color:#92400e;}.cd{background:#d1fae5;color:#065f46;}
.coks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.cok{background:#f8fafc;border-radius:8px;padding:10px;text-align:center;}
.cokv{font-size:18px;font-weight:800;color:#0f172a;}
.cokl{font-size:9px;color:#64748b;text-transform:uppercase;margin-top:2px;}
.tcard{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:20px;}
.thdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.ttl{font-size:12px;font-weight:700;color:#1e293b;}
.sbox{border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:11px;width:280px;}
.sbox:focus{outline:none;border-color:#6366f1;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:#f8fafc;}
th{text-align:left;padding:8px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap;cursor:pointer;}
th:hover{color:#6366f1;}
td{padding:8px 10px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle;}
tr:hover td{background:#f8fafc;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;}
.pp{background:#d1fae5;color:#065f46;}.pf{background:#fee2e2;color:#991b1b;}
.pu{background:#fef3c7;color:#92400e;}.pd{background:#dbeafe;color:#1e40af;}
.rbar{display:flex;align-items:center;gap:6px;}
.rbg{background:#e2e8f0;border-radius:4px;height:4px;width:50px;overflow:hidden;}
.rbf{height:4px;border-radius:4px;}
.ctag{font-size:9px;padding:2px 6px;border-radius:4px;background:#ede9fe;color:#5b21b6;font-weight:600;white-space:nowrap;}
.pid{color:#94a3b8;font-size:9px;font-family:monospace;word-break:break-all;}
.pgn{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:#64748b;}
.pbts{display:flex;gap:5px;}
.pb{border:1.5px solid #e2e8f0;background:white;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:10px;color:#475569;}
.pb:hover{background:#6366f1;color:white;border-color:#6366f1;}
@media(max-width:900px){.g2,.g3,.cog{grid-template-columns:1fr;}.card.full{grid-column:1;}}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><p>Loading dashboard...</p></div>

<div class="header">
  <div>
    <h1>&#x1F501; Retraining Performance Dashboard</h1>
    <div class="sub">Trainer effectiveness &middot; Improvement &amp; F20 ratings &middot; Target: 4.8</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span class="data-badge" id="dbadge">&#10003; 2,697 rows</span>
    <label class="upload-btn" for="csvInput">&#8593; Refresh CSV</label>
    <input type="file" id="csvInput" accept=".csv">
  </div>
</div>

<div class="filter-panel">
  <div class="filter-row">
    <div class="fg"><label>Year</label>
      <div class="cb-wrap" id="wY">
        <div class="cb-trigger" id="tY"><span id="lY">All Years</span><span class="arr">&#9660;</span></div>
        <div class="cb-dd" id="dY"></div>
      </div>
    </div>
    <div class="fg"><label>Month</label>
      <div class="cb-wrap" id="wM">
        <div class="cb-trigger" id="tM"><span id="lM">All Months</span><span class="arr">&#9660;</span></div>
        <div class="cb-dd" id="dM"></div>
      </div>
    </div>
    <div class="fg"><label>Trainer</label>
      <div class="cb-wrap" id="wT">
        <div class="cb-trigger" id="tT"><span id="lT">All Trainers</span><span class="arr">&#9660;</span></div>
        <div class="cb-dd" id="dT"></div>
      </div>
    </div>
    <div class="fg"><label>Category</label>
      <select id="fCat" onchange="applyF()"><option value="">All Categories</option></select>
    </div>
    <div class="fg"><label>Level</label>
      <select id="fLv" onchange="applyF()"><option value="">All</option><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select>
    </div>
    <div class="fg"><label>Result</label>
      <select id="fRs" onchange="applyF()"><option value="">All</option><option value="1">Pass</option><option value="0">Fail</option></select>
    </div>
    <div class="fg"><label>Cool Off</label>
      <select id="fCo" onchange="applyF()"><option value="">All</option><option value="u">Under (&lt;20)</option><option value="d">Done (&ge;20)</option></select>
    </div>
    <div class="fg"><label>F20 Rating</label>
      <select id="fRt" onchange="applyF()"><option value="">All</option><option value="b">Below 4.8</option><option value="a">4.8 and above</option></select>
    </div>
    <button class="freset" onclick="resetAll()">&#10005; Reset</button>
  </div>
</div>

<div class="content">
  <div class="kpis">
    <div class="kpi bl"><div class="kl">Total Partners Retrained</div><div class="kv" id="kT">-</div><div class="ks">Retraining sessions</div></div>
    <div class="kpi gr"><div class="kl">Pass Rate</div><div class="kv" id="kP">-</div><div class="ks" id="kPN">-</div><span class="kb" id="kPB"></span></div>
    <div class="kpi or"><div class="kl">Avg F20 Rating</div><div class="kv" id="kR">-</div><div class="ks">Target &ge; 4.8</div><span class="kb" id="kRB"></span></div>
    <div class="kpi re"><div class="kl">F20 Rating Below 4.8</div><div class="kv" id="kH">-</div><div class="ks" id="kHS">-</div></div>
    <div class="kpi te"><div class="kl">Under Cool Off</div><div class="kv" id="kU">-</div><div class="ks">Rating count &lt; 20</div></div>
  </div>

  <div class="stitle">&#127942; Trainer Performance Ranking</div>
  <div class="g3">
    <div class="card">
      <div class="ct">Overall (All Trainees)</div>
      <div class="cs">Cool Off + Completed Cool Off &mdash; % with F20 &ge; 4.8</div>
      <div style="position:relative;height:300px;overflow:hidden;"><canvas id="cTrAll"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">Under Cool Off Only</div>
      <div class="cs">Rating count &lt; 20 &mdash; % with F20 &ge; 4.8</div>
      <div style="position:relative;height:300px;overflow:hidden;"><canvas id="cTrCO"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">Completed Cool Off Only</div>
      <div class="cs">Rating count &ge; 20 &mdash; % with F20 &ge; 4.8</div>
      <div style="position:relative;height:300px;overflow:hidden;"><canvas id="cTrCC"></canvas></div>
    </div>
  </div>

  <div class="stitle">&#128200; Performance Overview</div>
  <div class="g2">
    <div class="card">
      <div class="ct">Pass vs Fail by Month</div>
      <div class="cs">Count + % for both pass and fail</div>
      <div id="cMoT"></div>
    </div>
    <div class="card">
      <div class="ct">Pass Rate by Retraining Level</div>
      <div class="cs">% inside bar, pass/total count above</div>
      <div id="cLvT"></div>
    </div>

    <div class="card">
      <div class="ct">Pass Rate by Category</div>
      <div class="cs">Pass % and pass/total count per category</div>
      <div id="cCaT"></div>
    </div>
    <div class="card full">
      <div class="ct">F20 Rating Distribution</div>
      <div class="cs">Partner count by rating band</div>
      <div id="rdTable"></div>
    </div>
  </div>

  <div class="stitle">&#10052; Cool Off Performance (by Rating Count)</div>
  <div class="cog">
    <div class="cocard">
      <div class="cohdr"><span class="cobadge cu">Under Cool Off &mdash; Rating Count &lt; 20</span></div>
      <div class="coks">
        <div class="cok"><div class="cokv" id="c0n">-</div><div class="cokl">Partners</div></div>
        <div class="cok"><div class="cokv" id="c0p">-</div><div class="cokl">Pass Rate</div></div>
        <div class="cok"><div class="cokv" id="c0r">-</div><div class="cokl">Avg F20</div></div>
      </div>
      <div id="cC0"></div>
    </div>
    <div class="cocard">
      <div class="cohdr"><span class="cobadge cd">Completed Cool Off &mdash; Rating Count &ge; 20</span></div>
      <div class="coks">
        <div class="cok"><div class="cokv" id="c1n">-</div><div class="cokl">Partners</div></div>
        <div class="cok"><div class="cokv" id="c1p">-</div><div class="cokl">Pass Rate</div></div>
        <div class="cok"><div class="cokv" id="c1r">-</div><div class="cokl">Avg F20</div></div>
      </div>
      <div id="cC1"></div>
    </div>
  </div>

  <div class="tcard">
    <div class="thdr">
      <div class="ttl">Provider Detail &mdash; <span id="tCnt" style="color:#6366f1;"></span></div>
      <input class="sbox" id="tSrch" placeholder="Search by name, provider ID or trainer..." oninput="applyF()">
    </div>
    <div class="tw">
      <table>
        <thead><tr>
          <th onclick="srt('n')">Provider / ID &#8597;</th>
          <th onclick="srt('t')">Trainer &#8597;</th>
          <th onclick="srt('c')">Category &#8597;</th>
          <th onclick="srt('l')">Lvl &#8597;</th>
          <th onclick="srt('m')">Month &#8597;</th>
          <th onclick="srt('fr')">F20 Rating &#8597;</th>
          <th onclick="srt('rc')">Rating Count &#8597;</th>
          <th>Cool Off Status</th>
          <th onclick="srt('im')">Retrain Result &#8597;</th>
          <th>F20 Target</th>
        </tr></thead>
        <tbody id="tBdy"></tbody>
      </table>
    </div>
    <div class="pgn">
      <span id="pgI"></span>
      <div class="pbts">
        <button class="pb" onclick="pgC(-1)">&#8592; Prev</button>
        <button class="pb" onclick="pgC(1)">Next &#8594;</button>
      </div>
    </div>
  </div>
</div>

function buildDD(key,items,lf,hasSearch){
  var stObj = key==='Y'?StY:key==='M'?StM:StT;
  var dd=document.getElementById('d'+key);
  dd.innerHTML='';
  if(hasSearch){
    var si=document.createElement('div');si.className='cb-si';
    var inp=document.createElement('input');inp.type='text';inp.placeholder='Search...';
    inp.addEventListener('input',function(){ddSearch(this,key);});
    si.appendChild(inp);dd.appendChild(si);
  }
  var allRow=document.createElement('div');
  allRow.className='cb-item all-row'+(hasSearch?'':' no-search');
  var aCB=document.createElement('input');aCB.type='checkbox';aCB.id='ca'+key;aCB.checked=true;
  aCB.addEventListener('change',function(){toggleAll(key);});
  var aLb=document.createElement('label');aLb.htmlFor='ca'+key;aLb.textContent='All';aLb.style.cursor='pointer';
  allRow.appendChild(aCB);allRow.appendChild(aLb);dd.appendChild(allRow);
  for(var i=0;i<items.length;i++){
    stObj[items[i]]=true;
    var div=document.createElement('div');div.className='cb-item';div.setAttribute('data-v',items[i]);
    var cb=document.createElement('input');cb.type='checkbox';cb.id='c'+key+i;cb.checked=true;
    (function(v){cb.addEventListener('change',function(){cbChg(key,v,this.checked);});})(items[i]);
    var lb=document.createElement('label');lb.htmlFor='c'+key+i;lb.textContent=lf?lf(items[i]):items[i];lb.style.cursor='pointer';
    div.appendChild(cb);div.appendChild(lb);dd.appendChild(div);
  }
  document.getElementById('t'+key).addEventListener('click',function(){toggleDD(key);});
}

function ddSearch(inp,key){
  var q=inp.value.toLowerCase();
  var items=document.getElementById('d'+key).querySelectorAll('.cb-item:not(.all-row)');
  for(var i=0;i<items.length;i++)items[i].style.display=items[i].getAttribute('data-v').toLowerCase().indexOf(q)>=0?'':'none';
}

}

function getStObj(key){return key==='Y'?StY:key==='M'?StM:StT;}

function toggleAll(key){
  var st=getStObj(key);
  var ch=document.getElementById('ca'+key).checked;
  var cbs=document.getElementById('d'+key).querySelectorAll('.cb-item:not(.all-row) input');
  for(var i=0;i<cbs.length;i++)cbs[i].checked=ch;
  var keys=Object.keys(st);for(var i=0;i<keys.length;i++)st[keys[i]]=ch;
  updLabel(key);applyF();
}

function cbChg(key,val,ch){
  var st=getStObj(key);st[val]=ch;
  var all=Object.keys(st),sel=all.filter(function(v){return st[v];});
  var aCB=document.getElementById('ca'+key);
  if(sel.length===all.length){aCB.checked=true;aCB.indeterminate=false;}
  else if(sel.length===0){aCB.checked=false;aCB.indeterminate=false;}
  else{aCB.indeterminate=true;}
  updLabel(key);applyF();
}

function updLabel(key){
  var st=getStObj(key);
  var all=Object.keys(st),sel=all.filter(function(v){return st[v];});
  var names={Y:'Years',M:'Months',T:'Trainers'};
  var lbl=document.getElementById('l'+key);
  if(!sel.length){lbl.textContent='None';}
  else if(sel.length===all.length){lbl.textContent='All '+names[key];}
  else{lbl.innerHTML=sel.length+' <span class="cb-cnt">'+sel.length+'</span>';}
}

function getSel(key){
  var st=getStObj(key);
  var all=Object.keys(st),sel=all.filter(function(v){return st[v];});
  return sel.length===all.length?null:sel;
}

function applyF(){
  var yr=getSel('Y'),mo=getSel('M'),tr2=getSel('T');
  var cat=document.getElementById('fCat').value;
  var lv=document.getElementById('fLv').value;
  var rs=document.getElementById('fRs').value;
  var co=document.getElementById('fCo').value;
  var rt=document.getElementById('fRt').value;
  var sr=(document.getElementById('tSrch').value||'').toLowerCase().trim();
  fd=allData.filter(function(r){
    if(yr&&yr.indexOf(r.m.slice(0,4))<0)return false;
    if(mo&&mo.indexOf(r.m)<0)return false;
    if(tr2&&tr2.indexOf(r.t)<0)return false;
    if(cat&&r.c!==cat)return false;
    if(lv&&r.l!==parseInt(lv,10))return false;
    if(rs!==''&&r.im!==parseInt(rs,10))return false;
    if(co==='u'&&r.rc>=20)return false;
    if(co==='d'&&r.rc<20)return false;
    if(rt==='b'&&r.fr>=4.8)return false;
    if(rt==='a'&&r.fr<4.8)return false;
    if(sr){var s=(r.n+' '+r.t+' '+r.i).toLowerCase();if(s.indexOf(sr)<0)return false;}
    return true;
  });
  pgN=0;render();
}

function resetAll(){
  ['Y','M','T'].forEach(function(key){
    var st=getStObj(key);var keys=Object.keys(st);for(var i=0;i<keys.length;i++)st[keys[i]]=true;
    var cbs=document.getElementById('d'+key).querySelectorAll('input[type=checkbox]');
    for(var i=0;i<cbs.length;i++){cbs[i].checked=true;cbs[i].indeterminate=false;}
    updLabel(key);
  });
  ['fCat','fLv','fRs','fCo','fRt'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('tSrch').value='';
  applyF();
}

function kpis(){

  var ar=n?(sr/n).toFixed(2):0;
  var bpct=n?(bt/n*100).toFixed(1):0;
  document.getElementById('kT').textContent=n.toLocaleString();
  document.getElementById('kP').textContent=pr+'%';
  document.getElementById('kPN').textContent=ps+' passed of '+n;

function cooloff(){
  var d=fd,g0=[],g1=[];
  for(var i=0;i<d.length;i++){if(d[i].rc<20)g0.push(d[i]);else g1.push(d[i]);}
  [g0,g1].forEach(function(g,v){
    var n=g.length,ps=0,sr=0;
    for(var i=0;i<n;i++){if(g[i].im===1)ps++;sr+=g[i].fr;}
    document.getElementById('c'+v+'n').textContent=n;
    document.getElementById('c'+v+'p').textContent=n?parseFloat((ps/n*100).toFixed(1))+'%':'0%';
    document.getElementById('c'+v+'r').textContent=n?parseFloat((sr/n).toFixed(2)).toFixed(2):'0.00';
    dc('co'+v);
    var ms={};for(var i=0;i<g.length;i++)ms[g[i].m]=1;
    var mk=Object.keys(ms).sort(),pm=[],fm2=[];
    for(var j=0;j<mk.length;j++){
      var p=0,f=0;for(var i=0;i<g.length;i++){if(g[i].m===mk[j]){if(g[i].im===1)p++;else f++;}}
      pm.push(p);fm2.push(f);
    }
    var coR='';
    for(var j=0;j<mk.length;j++){var cTot=(pm[j]+fm2[j])||1,cPct=Math.round(pm[j]/cTot*100);coR+='<tr style="border-bottom:1px solid #f1f5f9;background:'+(j%2===0?'#fafafa':'#fff')+'">'
      +'<td style="padding:8px 14px;font-weight:600;font-size:12px">'+fm(mk[j])+'</td>'
      +'<td style="padding:8px 14px;text-align:center;color:#10b981;font-weight:800;font-size:16px">'+pm[j]+'</td>'
      +'<td style="padding:8px 14px;text-align:center;color:#ef4444;font-weight:800;font-size:16px">'+fm2[j]+'</td>'
      +'<td style="padding:8px 14px;text-align:center;font-weight:600;font-size:13px">'+(pm[j]+fm2[j])+'</td>'
      +'<td style="padding:8px 14px"><span style="font-weight:700;color:'+(cPct>=50?'#10b981':'#f59e0b')+'">'+cPct+'%</span></td>'
      +'</tr>';}
    document.getElementById('cC'+v).innerHTML='<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0">'
      +'<th style="padding:8px 14px;text-align:left;font-size:10px;color:#718096;font-weight:700;text-transform:uppercase">Month</th>'
      +'<th style="padding:8px 14px;text-align:center;font-size:10px;color:#10b981;font-weight:700;text-transform:uppercase">Pass</th>'
      +'<th style="padding:8px 14px;text-align:center;font-size:10px;color:#ef4444;font-weight:700;text-transform:uppercase">Fail</th>'
      +'<th style="padding:8px 14px;text-align:center;font-size:10px;color:#718096;font-weight:700;text-transform:uppercase">Total</th>'
      +'<th style="padding:8px 14px;text-align:left;font-size:10px;color:#718096;font-weight:700;text-transform:uppercase">Pass %</th>'
      +'</tr></thead><tbody>'+coR+'</tbody></table>';
  });
}

function srt(col){
  if(sk===col){sa=!sa;}else{sk=col;sa=true;}
  fd.sort(function(a,b){var av=a[col],bv=b[col];if(typeof av==='number')return sa?av-bv:bv-av;return sa?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));});
  tbl();
}

  var s=pgN*PS,e=Math.min(s+PS,fd.length);
